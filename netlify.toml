[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[dev]
  framework = "vite"
  command = "npm run dev"
  port = 8888
  publish = "."
  autoLaunch = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
